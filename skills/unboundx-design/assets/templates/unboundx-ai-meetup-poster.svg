  <text x="850" y="1546" fill="#A0A0A5" font-family="Outfit, Arial, sans-serif" font-size="26" font-weight="500">SPEAKERS / AGENDA</text>
  <text x="850" y="1600" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="700">01  PRODUCT + AI SYSTEMS</text>
  <text x="850" y="1644" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="700">02  MODEL WORKFLOWS</text>
  <text x="850" y="1688" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="700">03  OPEN DISCUSSION</text>
</svg>
