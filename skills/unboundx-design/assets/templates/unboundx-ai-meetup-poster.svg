<svg width="1240" height="1754" viewBox="0 0 1240 1754" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UNBOUNDX AI meetup poster template</title>
  <desc id="desc">Poster starter for UNBOUNDX offline AI technology meetups with logo, headline, event details, and QR area.</desc>
  <rect width="1240" height="1754" fill="#050505"/>
  <rect x="48" y="48" width="1144" height="1658" rx="34" stroke="#1A1A1E" stroke-width="2"/>
  <path d="M918 250C1020 324 1090 418 1128 532" stroke="#F26122" stroke-width="18" stroke-linecap="round" opacity="0.18"/>
  <path d="M888 560C1004 462 1084 360 1126 240" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.12"/>
  <g transform="translate(106 98)">
    <g transform="translate(0 6)">
      <path d="M 10 10 Q 70 40 70 70" fill="none" stroke="#F26122" stroke-width="14" stroke-linecap="round"/>
      <path d="M 10 70 Q 70 40 70 10" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    </g>
    <g transform="translate(102 56)">
      <text x="0" y="0" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">UNBOUND<tspan fill="#F26122">X</tspan></text>
    </g>
  </g>
  <text x="108" y="238" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.28em">OFFLINE EVENT / AI TECH MEETUP</text>
  <text x="108" y="426" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="130" font-weight="800" letter-spacing="-0.07em">AI</text>
  <text x="108" y="550" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="130" font-weight="800" letter-spacing="-0.07em">TECH</text>
  <text x="108" y="674" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="130" font-weight="800" letter-spacing="-0.07em">MEETUP</text>
  <text x="112" y="772" fill="#F26122" font-family="Outfit, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="0.18em">UNBOUNDX / SHENZHEN / COMMUNITY SERIES</text>
  <text x="108" y="890" fill="#A0A0A5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="400">一场聚焦 AI 工程实践、产品创新与真实落地经验的线下交流会。</text>
  <text x="108" y="944" fill="#A0A0A5" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="400">可替换为活动介绍、主题摘要、主讲嘉宾亮点或报名说明。</text>
  <line x1="108" y1="1068" x2="1132" y2="1068" stroke="#1A1A1E" stroke-width="2"/>
  <text x="108" y="1152" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0.22em">DATE / TIME</text>
  <text x="108" y="1212" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-0.03em">2026.05.18 / 19:30 - 21:30</text>
  <text x="108" y="1318" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0.22em">VENUE / CITY</text>
  <text x="108" y="1378" fill="#FFFFFF" font-family="Noto Sans SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="48" font-weight="700">南山区 · 深圳湾科技生态园</text>
  <text x="108" y="1484" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0.22em">HOST</text>
  <text x="108" y="1544" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="44" font-weight="700">UNBOUNDX</text>
  <rect x="850" y="1112" width="282" height="282" rx="20" fill="#101012" stroke="#F26122" stroke-width="2"/>
  <rect x="886" y="1148" width="210" height="210" rx="12" stroke="#A0A0A5" stroke-width="2" stroke-dasharray="12 10"/>
