<svg width="1080" height="1600" viewBox="0 0 1080 1600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">UNBOUNDX employee badge template</title>
  <desc id="desc">Vertical work badge starter for UNBOUNDX with editable identity, access, and QR sections.</desc>
  <rect width="1080" height="1600" rx="48" fill="#050505"/>
  <rect x="40" y="40" width="1000" height="1520" rx="36" stroke="#1A1A1E" stroke-width="2"/>
  <rect x="66" y="66" width="948" height="1468" rx="28" stroke="#101012" stroke-width="2"/>
  <rect x="120" y="130" width="12" height="190" rx="6" fill="#F26122"/>
  <g transform="translate(156 130)">
    <g transform="translate(0 8)">
      <path d="M 10 10 Q 70 40 70 70" fill="none" stroke="#F26122" stroke-width="14" stroke-linecap="round"/>
      <path d="M 10 70 Q 70 40 70 10" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    </g>
    <g transform="translate(102 56)">
      <text x="0" y="0" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-0.02em">UNBOUND<tspan fill="#F26122">X</tspan></text>
    </g>
  </g>
  <text x="156" y="352" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="0.28em">EMPLOYEE BADGE</text>
  <rect x="156" y="406" width="768" height="560" rx="28" fill="#101012" stroke="#1A1A1E" stroke-width="2"/>
  <rect x="192" y="442" width="696" height="488" rx="20" stroke="#25252A" stroke-width="2" stroke-dasharray="16 12"/>
  <text x="540" y="694" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle" letter-spacing="0.16em">PHOTO / AVATAR</text>
  <text x="156" y="1068" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-0.05em">EMPLOYEE</text>
  <text x="156" y="1160" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-0.05em">NAME</text>
  <text x="160" y="1226" fill="#F26122" font-family="Outfit, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="0.16em">ROLE / TEAM</text>
  <line x1="156" y1="1270" x2="924" y2="1270" stroke="#1A1A1E" stroke-width="2"/>
  <text x="156" y="1336" fill="#A0A0A5" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="500">COMPANY: UNBOUNDX</text>
  <text x="156" y="1388" fill="#A0A0A5" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="500">EMPLOYEE ID: UBX-0001</text>
  <text x="156" y="1440" fill="#A0A0A5" font-family="Outfit, Arial, sans-serif" font-size="28" font-weight="500">VALID UNTIL: YYYY.MM.DD</text>
  <rect x="770" y="1318" width="154" height="154" rx="18" fill="#101012" stroke="#F26122" stroke-width="2"/>
  <rect x="794" y="1342" width="106" height="106" rx="8" stroke="#A0A0A5" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="847" y="1498" fill="#606065" font-family="Outfit, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="0.18em">QR / NFC</text>
</svg>

