<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UNBOUNDX · 品牌视觉应用 (v3 静态效果版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: oklch(0.965 0.008 250);
        --ink: oklch(0.18 0.02 257); /* 深色背景 */
        --panel: oklch(0.24 0.02 257);
        --mist: oklch(0.79 0.03 250);
        --muted: oklch(0.54 0.03 255);
        --accent: oklch(0.64 0.18 34);      /* #db5c3d 熔岩橙 */
        --accent-glow: oklch(0.64 0.18 34 / 0.3);
        
        --font-en: "Outfit", sans-serif;
        --font-cn: "Noto Sans SC", sans-serif;
        
        --radius-lg: 32px;
        --radius-md: 20px;
        --shadow-hover: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-cn);
        background-color: var(--ink);
        color: var(--paper);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Noise overlay for texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 50;
      }

      .container {
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 5vw;
        position: relative;
        z-index: 1;
      }

      /* Header */
      header {
        padding: 60px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .brand-title {
        font-family: var(--font-en);
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 800;
        letter-spacing: 0.05em;
      }
      
      .brand-title span { color: var(--accent); }
      .meta-info { color: var(--muted); font-size: 0.9rem; margin-top: 8px; letter-spacing: 0.1em; }

      section {
        padding: 100px 0;
      }

      .section-title {
        font-family: var(--font-en);
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 300;
        margin-bottom: 60px;
        letter-spacing: -0.02em;
      }

      /* Logo Display Stage (Static) */
      .logo-stage {
        background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2));
        border-radius: var(--radius-lg);
        border: 1px solid rgba(255,255,255,0.05);
        padding: clamp(60px, 10vw, 120px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-hover);
        position: relative;
        overflow: hidden;
      }

      .logo-stage::after {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }

      .hero-logo-svg {
        position: relative;
        z-index: 2;
        width: clamp(200px, 30vw, 300px);
        height: clamp(200px, 30vw, 300px);
        /* Static logo, only a subtle hover effect */
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .logo-stage:hover .hero-logo-svg {
        transform: scale(1.05);
      }

      .logo-label {
        position: relative;
        z-index: 2;
        margin-top: 40px;
        font-family: var(--font-en);
        letter-spacing: 0.4em;
        font-size: 0.9rem;
        color: var(--muted);
        text-transform: uppercase;
      }

      /* --- Mockups Section --- */
      .mockups-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 60px;
      }

      @media (min-width: 1024px) {
        .mockups-grid {
          grid-template-columns: 1fr 1fr;
        }
        .mockup-wide {
          grid-column: span 2;
        }
      }

      /* Common Mockup Container */
      .mockup-container {
        background: var(--panel);
        border-radius: var(--radius-md);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }
      
      .mockup-info {
        position: absolute;
        top: 30px;
        left: 40px;
        z-index: 10;
      }
      
      .mockup-info h3 {
        font-family: var(--font-en);
        font-weight: 500;
        font-size: 1.2rem;
        letter-spacing: 0.1em;
        margin-bottom: 4px;
      }
      
      .mockup-info p {
        font-size: 0.85rem;
        color: var(--muted);
      }

      /* 1. Splash Screen (Mobile) */
      .phone-mockup {
        width: 320px;
        height: 680px;
        border-radius: 44px;
        background: #000;
        border: 12px solid #222;
        box-shadow: inset 0 0 0 2px #444, 0 30px 60px rgba(0,0,0,0.5);
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-top: 40px;
      }

      /* Phone notch */
      .phone-mockup::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 24px;
        background: #222;
        border-bottom-left-radius: 16px;
        border-bottom-right-radius: 16px;
        z-index: 10;
      }

      .splash-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% -20%, rgba(219, 92, 61, 0.15) 0%, transparent 60%);
      }

      .splash-logo {
        width: 120px;
        height: 120px;
        z-index: 2;
      }

      .splash-bottom {
        position: absolute;
        bottom: 40px;
        left: 0;
        width: 100%;
        text-align: center;
        z-index: 2;
      }

      .splash-wordmark {
        font-family: var(--font-en);
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 0.2em;
      }
      .splash-wordmark span { color: var(--accent); }

      /* 2. Poster Design */
      .poster-mockup {
        width: 100%;
        max-width: 460px;
        aspect-ratio: 3/4;
        background: #0a0c10;
        border-radius: 8px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        position: relative;
        overflow: hidden;
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 40px;
        border: 1px solid rgba(255,255,255,0.08);
      }

      /* Huge abstract X in background */
      .poster-bg-svg {
        position: absolute;
        right: -30%;
        top: -10%;
        width: 120%;
        height: 120%;
        opacity: 0.15;
        transform: rotate(15deg);
        pointer-events: none;
      }

      .poster-top {
        position: relative;
        z-index: 2;
      }

      .poster-date {
        font-family: var(--font-en);
        color: var(--accent);
        font-weight: 600;
        letter-spacing: 0.1em;
        font-size: 0.9rem;
      }

      .poster-title-text {
        font-family: var(--font-en);
        font-size: clamp(2.5rem, 5vw, 4rem);
        font-weight: 800;
        line-height: 0.9;
        text-transform: uppercase;
        margin-top: 16px;
        background: linear-gradient(135deg, #fff 0%, #888 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .poster-bottom {
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }

      .poster-logo-small {
        width: 48px;
        height: 48px;
      }

      .poster-tagline {
        font-size: 0.8rem;
        color: var(--muted);
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      /* 3. Launch Event Key Visual (Wide) */
      .key-visual-mockup {
        width: 100%;
        aspect-ratio: 21/9;
        background: #050608;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.03);
      }

      .kv-glow {
        position: absolute;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(ellipse at center, rgba(219, 92, 61, 0.4) 0%, transparent 60%),
          conic-gradient(from 180deg at 50% 50%, transparent 0deg, rgba(219, 92, 61, 0.1) 90deg, transparent 180deg, rgba(219, 92, 61, 0.1) 270deg, transparent 360deg);
        opacity: 0.8;
        mix-blend-mode: screen;
      }

      .kv-lines {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        transform: perspective(500px) rotateX(60deg) translateY(100px) translateZ(-200px);
        transform-origin: bottom;
      }

      .kv-content {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .kv-logo {
        width: clamp(150px, 20vw, 240px);
        height: clamp(150px, 20vw, 240px);
        filter: drop-shadow(0 0 40px rgba(219, 92, 61, 0.6));
      }

      .kv-text {
        margin-top: 40px;
        font-family: var(--font-en);
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 300;
        letter-spacing: 0.4em;
        text-shadow: 0 0 20px rgba(255,255,255,0.5);
      }
      
      .kv-text span {
        font-weight: 700;
        color: var(--accent);
      }

    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-content">
          <div>
            <h1 class="brand-title">UNBOUND<span>X</span></h1>
            <p class="brand-subtitle">Brand Applications (v3 Static)</p>
          </div>
          <div class="meta-info">
            <p>DIMENSIONAL BREAKTHROUGH</p>
            <p>v3.0 / STATIC & MOCKUPS</p>
          </div>
        </div>
      </header>

      <!-- Section 1: Core Static Logo -->
      <section>
        <h2 class="section-title">01. Core Symbol</h2>
        <div class="logo-stage">
          <svg class="hero-logo-svg" viewBox="0 0 120 120">
            <!-- Static Layer 1 -->
            <g transform-origin="60 60">
              <rect x="15" y="15" width="90" height="90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" rx="4" />
            </g>
            <!-- Static Layer 2 -->
            <g transform-origin="60 60">
              <rect x="25" y="25" width="70" height="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" rx="4" />
            </g>
            <!-- Static Layer 3 -->
            <g transform-origin="60 60">
              <rect x="35" y="35" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" rx="4" />
            </g>
            
            <!-- Static X -->
            <path d="M 5 5 L 115 115 M 115 5 L 5 115" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" />
          </svg>
          <div class="logo-label">Echo Break / Static Form</div>
        </div>
      </section>

      <!-- Section 2: Applications -->
      <section>
        <h2 class="section-title">02. Applications</h2>
        
        <div class="mockups-grid">
          
          <!-- Mockup 1: Splash Screen -->
          <div class="mockup-container">
            <div class="mockup-info">
              <h3>App Splash</h3>
              <p>启动页设计</p>
            </div>
            
            <div class="phone-mockup">
              <div class="splash-bg"></div>
              <svg class="splash-logo" viewBox="0 0 120 120">
                <rect x="15" y="15" width="90" height="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" rx="4" />
                <rect x="25" y="25" width="70" height="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3" rx="4" />
                <rect x="35" y="35" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4" rx="4" />
                <path d="M 5 5 L 115 115 M 115 5 L 5 115" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" />
              </svg>
              
              <div class="splash-bottom">
                <div class="splash-wordmark">UNBOUND<span>X</span></div>
              </div>
            </div>
          </div>

          <!-- Mockup 2: Brand Poster -->
          <div class="mockup-container">
            <div class="mockup-info">
              <h3>Brand Poster</h3>
              <p>品牌海报设计</p>
            </div>
            
            <div class="poster-mockup">
              <!-- Background abstract SVG -->
              <svg class="poster-bg-svg" viewBox="0 0 120 120">
                <rect x="15" y="15" width="90" height="90" fill="none" stroke="var(--accent)" stroke-width="1" rx="4" />
                <rect x="25" y="25" width="70" height="70" fill="none" stroke="var(--accent)" stroke-width="2" rx="4" />
                <rect x="35" y="35" width="50" height="50" fill="none" stroke="var(--accent)" stroke-width="4" rx="4" />
                <path d="M 5 5 L 115 115 M 115 5 L 5 115" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" />
              </svg>

              <div class="poster-top">
                <div class="poster-date">VOL.01 / 2024</div>
                <div class="poster-title-text">DIMENSIONAL<br/>BREAKTHROUGH</div>
              </div>

              <div class="poster-bottom">
                <svg class="poster-logo-small" viewBox="0 0 120 120">
                  <path d="M 5 5 L 115 115 M 115 5 L 5 115" stroke="#fff" stroke-width="16" stroke-linecap="round" />
                </svg>
                <div class="poster-tagline">UNBOUNDX STUDIO</div>
              </div>
            </div>
          </div>

          <!-- Mockup 3: Key Visual (Wide) -->
          <div class="mockup-container mockup-wide" style="padding: 0;">
            <div class="mockup-info" style="top: 40px; left: 50px;">
              <h3>Key Visual</h3>
              <p>发布会主视觉</p>
            </div>
            
            <div class="key-visual-mockup">
              <div class="kv-glow"></div>
              <div class="kv-lines"></div>
              
              <div class="kv-content">
                <svg class="kv-logo" viewBox="0 0 120 120">
                  <rect x="15" y="15" width="90" height="90" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" rx="4" />
                  <rect x="25" y="25" width="70" height="70" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" rx="4" />
                  <rect x="35" y="35" width="50" height="50" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="4" rx="4" />
                  <path d="M 5 5 L 115 115 M 115 5 L 5 115" stroke="var(--accent)" stroke-width="12" stroke-linecap="round" />
                </svg>
                
                <div class="kv-text">UNBOUND<span>X</span></div>
              </div>
            </div>
          </div>

        </div>
      </section>
    </div>
  </body>
</html>
